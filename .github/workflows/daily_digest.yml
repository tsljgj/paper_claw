name: 📰 Daily arXiv Digest

on:
  schedule:
    - cron: "0 1 * * *"  # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:
    inputs:
      day:
        description: '指定运行日期 (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  build-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      # SMTP 配置 (可选)
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      # API 配置 (可选)
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ARXIV_CONTACT_EMAIL: ${{ secrets.ARXIV_CONTACT_EMAIL }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔨 Build digest
        run: |
          if [ -n "${{ github.event.inputs.day }}" ]; then
            python scripts/main.py --day ${{ github.event.inputs.day }}
          else
            python scripts/main.py
          fi
      
      - name: 📤 Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/raw data/processed content/posts
          git diff --cached --quiet || git commit -m "📰 Update arXiv audio digest [$(date +'%Y-%m-%d')]"
          git push
