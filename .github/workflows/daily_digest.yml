name: 📰 Daily arXiv Digest

on:
  schedule:
    # 12:00 UTC = 08:00 America/New_York (EDT) / 07:00 (EST)
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      day:
        description: 'Run for a specific date (YYYY-MM-DD), optional'
        required: false
        default: ''

jobs:
  build-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      # SMTP config (set these as repository secrets)
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      # Optional fallback recipient list (config/recipients.json takes priority)
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      # LLM + arXiv config
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ARXIV_CONTACT_EMAIL: ${{ secrets.ARXIV_CONTACT_EMAIL }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔨 Build and email digest
        run: |
          # Use an explicit day so the run is stateless (no committed state.json
          # needed). Default to "today" in US Eastern; override via manual input.
          if [ -n "${{ github.event.inputs.day }}" ]; then
            DAY="${{ github.event.inputs.day }}"
          else
            DAY=$(TZ=America/New_York date +'%Y-%m-%d')
          fi
          echo "Building digest for $DAY"
          python scripts/main.py --day "$DAY"
