name: 📰 Daily arXiv Digest

# Runs once a day, fired ~10 min early so the ~5-min pipeline finishes and the
# email lands near 08:00 ET even with GitHub cron's usual drift.
on:
  schedule:
    - cron: "50 11 * * *"  # 11:50 UTC = 07:50 America/New_York (EDT) / 06:50 (EST)
  workflow_dispatch:
    inputs:
      day:
        description: 'Run for a specific date (YYYY-MM-DD), optional'
        required: false
        default: ''

jobs:
  build-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ARXIV_CONTACT_EMAIL: ${{ secrets.ARXIV_CONTACT_EMAIL }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔨 Build and email digest
        run: |
          # Stateless run for the given day (no committed state needed). Default
          # to "today" in US Eastern; override via the manual-dispatch input.
          if [ -n "${{ github.event.inputs.day }}" ]; then
            DAY="${{ github.event.inputs.day }}"
          else
            DAY=$(TZ=America/New_York date +'%Y-%m-%d')
          fi
          echo "Building digest for $DAY"
          python scripts/main.py --day "$DAY"
